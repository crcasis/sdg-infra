# .github/workflows/feature-pipeline.yml
name: Feature Branch CI
on:
  push:
    branches:
      - 'feature/*'

jobs:
  run-checks:
    uses: ./.github/workflows/terraform-ci.yml
    with:
      environment: dev
    secrets:
      # GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}