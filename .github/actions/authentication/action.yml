name: 'GCP Auth'
description: 'Autenticación con JSON Secret'
inputs:
  credentials_json: # <--- ESTO ES LO QUE FALTA
    description: 'Contenido del JSON'
    required: false
runs:
  using: "composite"
  steps:
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        # Aquí pasamos el valor que recibe la composite hacia la action interna
        credentials_json: ${{ inputs.credentials_json }}
        create_credentials_file: true